services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: mehyar500/openclaw-ai:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      OPENCLAW_NO_RESPAWN: "1"
      TZ: ${TZ:-America/New_York}
      ENABLE_OLLAMA: ${ENABLE_OLLAMA:-1}
      OLLAMA_HOST: 127.0.0.1:11434
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-nomic-embed-text}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SERVER_PASSWORD: ${SERVER_PASSWORD:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_GATEWAY_ID: ${CLOUDFLARE_GATEWAY_ID:-}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:-}
      CLOUDFLARE_AI_GATEWAY_TOKEN: ${CLOUDFLARE_AI_GATEWAY_TOKEN:-}
      AWIN_API_KEY: ${AWIN_API_KEY:-}
      PERFORMCB_API_KEY: ${PERFORMCB_API_KEY:-}
      PEERFORMCB_ACCOUNT_ID: ${PEERFORMCB_ACCOUNT_ID:-}
    volumes:
      - /opt/openclaw/home:/home/node/.openclaw
      - ollama-data:/home/node/.ollama
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 3m
      timeout: 10s
      start_period: 40s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openops}
      POSTGRES_USER: ${POSTGRES_USER:-openops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./compose/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  ollama-data:
